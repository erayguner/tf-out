# Dependabot config — daily scans, one grouped PR per ecosystem.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2

updates:
  # ---------- Python (pyproject.toml / uv.lock) ----------
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels: ["dependencies", "python"]
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      python-dependencies:
        applies-to: version-updates
        patterns: ["*"]
      python-security:
        applies-to: security-updates
        patterns: ["*"]

  # ---------- Node (sidecar/) ----------
  - package-ecosystem: "npm"
    directory: "/sidecar"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels: ["dependencies", "javascript"]
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      sidecar-dependencies:
        applies-to: version-updates
        patterns: ["*"]
      sidecar-security:
        applies-to: security-updates
        patterns: ["*"]

  # ---------- GitHub Actions (.github/workflows) ----------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels: ["dependencies", "github-actions"]
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    groups:
      github-actions:
        applies-to: version-updates
        patterns: ["*"]
      github-actions-security:
        applies-to: security-updates
        patterns: ["*"]
