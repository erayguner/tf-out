---
# yamllint config — pragmatic, not pedantic.
extends: default

rules:
  line-length:
    max: 160
    level: warning
  document-start: disable
  comments:
    min-spaces-from-content: 1
  comments-indentation: disable
  truthy:
    allowed-values: ['true', 'false', 'on', 'off']
    check-keys: false
  indentation:
    spaces: 2
    indent-sequences: consistent
  braces:
    max-spaces-inside: 1
  brackets:
    max-spaces-inside: 1

ignore: |
  .venv/
  node_modules/
  .claude/
  .claude-flow/
  .swarm/
  generated-terraform/
  audit-logs/
  uv.lock
