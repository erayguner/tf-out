# markdownlint config — relaxed for technical docs.
default: true

# Line length — disabled; tables and code blocks break it.
MD013: false

# Allow multiple headings with the same content (e.g. "## Example" in several sections).
MD024:
  siblings_only: true

# Allow inline HTML (we use <details> / <summary>).
MD033: false

# Don't require first line to be a top-level heading.
MD041: false

# Allow bare URLs in docs.
MD034: false

# ---- Cosmetic rules disabled to match existing doc style ----
# Ordered list numbering (we sometimes use out-of-order for clarity).
MD029: false
# Blanks around headings / fences / lists — stylistic, not structural.
MD022: false
MD031: false
MD032: false
# Code fence language tags — optional; many fences are shell sessions mixed with output.
MD040: false
# Unordered list marker style — both - and * accepted.
MD004: false
# First line blank / trailing blanks.
MD012: false
# Table pipe spacing — tolerate compact-style tables.
MD060: false
