# pre-commit config — runs on every commit via `pre-commit install`
# Bootstrap:  uv sync && uv run pre-commit install && uv run pre-commit install --hook-type commit-msg
# Run all:    uv run pre-commit run --all-files
default_install_hook_types: [pre-commit, commit-msg]
default_stages: [pre-commit]
fail_fast: false

repos:
  # ---------- General file hygiene ----------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-symlinks
      - id: destroyed-symlinks
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-toml
      - id: check-xml
      - id: pretty-format-json
        args: [--autofix, --no-sort-keys, --indent=2]
        exclude: ^(uv\.lock|package-lock\.json|examples/.*\.json)$
      - id: detect-private-key
        # Filter tests embed a fake PEM header to assert the secret scanner triggers.
        exclude: ^tests/test_filters\.py$
      - id: detect-aws-credentials
        args: [--allow-missing-credentials]
      - id: forbid-submodules

  # ---------- Python: ruff (lint + format) ----------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # ---------- Secret scanning ----------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  # ---------- YAML ----------
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [-c=.yamllint.yml]

  # ---------- Markdown ----------
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        args: [--config=.markdownlint.yaml, --ignore=node_modules, --ignore=.venv]

  # ---------- Shell scripts ----------
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt
        args: [-i, '2', -ci, -w]

  # ---------- GitHub Actions workflows ----------
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # ---------- Terraform (for generated + template files) ----------
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.105.0
    hooks:
      - id: terraform_fmt
        files: \.tf$

  # ---------- Commit message convention ----------
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - feat
          - fix
          - docs
          - style
          - refactor
          - perf
          - test
          - build
          - ci
          - chore
          - revert
          - security

  # ---------- Typo checker ----------
  - repo: https://github.com/crate-ci/typos
    rev: v1
    hooks:
      - id: typos
        args: [--config=.typos.toml]
